<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <!-- interactive-widget: Chrome 108+ on Android overlays the on-screen
      keyboard over the page by default; resizes-content shrinks the layout
      viewport instead, so the terminal refits (ResizeObserver) and the
      prompt stays visible above the keyboard. -->
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, interactive-widget=resizes-content"
    />
    <meta name="theme-color" content="#21252b" />
    <link rel="icon" href="/favicon.ico" sizes="48x48" />
    <link rel="icon" href="/icon.svg" sizes="any" type="image/svg+xml" />
    <link rel="apple-touch-icon" href="/apple-touch-icon-180x180.png" />
    <title>tmux</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
